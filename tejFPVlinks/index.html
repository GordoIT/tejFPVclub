<!DOCTYPE html>

<!--
  To change the theme, change the class on the html tag below to one of:
  - theme-auto: Automatically switches based on user's system preferences
  - theme-light: Forces light theme
  - theme-dark: Forces dark theme
-->

<html class="theme-dark" lang="pl"> <!-- Update`class="theme-auto" with your preference -->

  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Page Title - Change this to your name/brand (50-60 characters recommended) -->
    <title>Tej FPV</title>
    <link rel="icon" type="image/x-icon" href="/images/logoTej_200x200px.png"> <!-- Update this with your own favicon -->

    <!-- Meta Description - Write a description (150-160 characters recommended) -->
    <meta name="description" content="Poznański Klub Miłośników Dronów FPV">

    <!-- Keywords -->
    <meta name="keywords" content="your name, industry, and specialties">

    <!-- Canonical URL - Helps prevent duplicate content issues -->
    <meta rel="canonical" href="https://tejfpv.pl/links">

    <!-- Author Information -->
    <meta name="author" content="Tej FPV">

    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/brands.css">

    <!-- LittleLink Extended Stylesheet (Optional) -->
    <!-- <link rel="stylesheet" href="css/brands-extended.css"> -->
    <!-- Learn more at https://github.com/sethcottle/littlelink-extended.
         Remove comments if you've added LittleLink Extended dependencies -->

  </head>

<body>

    <div class="container">
        <div class="column">

            <!--
              By default, the Avatar is rounded. Use the following:
              - avatar--rounded: Automatically rounds the image
              - avatar--soft: Slightly rounds the image
              - avatar--none: Removes any rounding

              Be sure to replace the src with your own image path and update the alt text
            -->
            <img class="avatar avatar--rounded" src="images/logoTej_200x200px.png" srcset="images/logoTej_300x300px.png 2x" alt="Logo TejFPV">

            <!-- Replace with your name or brand -->
            <h1>
              <div>Tej FPV</div>
            </h1>

            <!-- Add a short description about yourself or your brand -->
            <p>Poznański Klub Miłośników Dronów FPV</p>

            <!-- All your buttons go here -->
            <div class="button-stack" role="navigation">

              <!-- Instagram -->
              <a class="button button-instagram" href="https://instagram.com/tej.fpv" target="_blank" rel="noopener" role="button"><img class="icon" aria-hidden="true" src="images/icons/instagram.svg" alt="Instagram Logo">Instagram</a>

              <!-- Facebook -->
              <a class="button button-faceb" href="https://facebook.com/tejfpv" target="_blank" rel="noopener" role="button"><img class="icon" aria-hidden="true" src="images/icons/facebook.svg" alt="Facebook Logo">Facebook</a>

	      <!-- YouTube Alt -->
              <a class="button button-yt-alt" href="https://youtube.com/@tejfpv" target="_blank" rel="noopener" role="button"><img class="icon" aria-hidden="true" src="images/icons/youtube-alt.svg" alt="YouTube Logo">YouTube</a>

              <!-- YouTube -->
              <!-- <a class="button button-yt" href="#" target="_blank" rel="noopener" role="button"><img class="icon" aria-hidden="true" src="images/icons/youtube.svg" alt="YouTube Logo">YouTube</a> -->

              <!-- Cal.com -->
              <a class="button button-cal" href="https://www.cal.eu/tejfpv" target="_blank" rel="noopener" role="button"><img class="icon" aria-hidden="true" src="images/icons/cal.svg" alt="Cal.com Logo">Wspólne treningi</a>

              <!-- Generic Website -->
              <a class="button button-default" href="https://tejfpv.pl" target="_blank" rel="noopener" role="button"><img class="icon" aria-hidden="true" src="images/icons/generic-website.svg" alt="Website Icon">tejfpv.pl</a>

      </div>

      <!-- Feel free to add your own footer information, including updating `privacy.html` to reflect how your LittleLink fork is set up -->
      <footer>
        <!-- <a href="privacy.html">Privacy Policy</a> | Build your own by forking <a href="https://littlelink.io" target="_blank" rel="noopener">LittleLink</a> -->
      </footer>

    </div>
  </div>

</body>

</html>
